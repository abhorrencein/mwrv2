<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — MWR Collective</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Manrope:wght@300;400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0A0908;font-family:'Manrope',sans-serif;cursor:none}
:root{--burg:#C8203A;--amber:#D4823E;--teal:#1B7A65;--blue:#2058A8;--f-d:'Syne',sans-serif;--f-m:'DM Mono',monospace;--ease-out:cubic-bezier(0.22,1,0.36,1)}
#cur{position:fixed;width:9px;height:9px;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);background:white;mix-blend-mode:difference}
#crr{position:fixed;width:32px;height:32px;border-radius:50%;pointer-events:none;z-index:9998;transform:translate(-50%,-50%);border:1px solid rgba(255,255,255,.22);opacity:.35;transition:width .45s var(--ease-out),height .45s var(--ease-out)}
body.hov #crr{width:54px;height:54px;opacity:.1}
#plasma{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}

nav{position:fixed;top:0;left:0;right:0;height:52px;z-index:500;display:flex;align-items:center;justify-content:space-between;padding:0 2.8rem;border-bottom:1px solid rgba(255,255,255,.07);background:rgba(10,9,8,.88);backdrop-filter:blur(18px)}
.nav-brand{text-decoration:none;display:flex;flex-direction:column;gap:4px}
.nav-tag{font-family:var(--f-m);font-size:.48rem;letter-spacing:.2em;text-transform:uppercase;color:var(--burg)}
.nav-cta{font-family:var(--f-m);font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;padding:.38rem 1rem;border:1px solid var(--burg);color:var(--burg);transition:all .2s}
.nav-cta:hover{background:var(--burg);color:white}

#content{
  position:fixed;inset:0;top:52px;
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  text-align:center;z-index:10;
  padding:2rem;
}
.num{
  font-family:var(--f-d);font-size:clamp(8rem,22vw,18rem);
  font-weight:800;line-height:.82;letter-spacing:-.06em;
  color:rgba(255,255,255,.06);
  margin-bottom:0;
  animation:fadeUp .8s var(--ease-out) .1s both;
}
.title{
  font-family:var(--f-d);font-size:clamp(1.6rem,4vw,3.2rem);
  font-weight:800;letter-spacing:-.04em;color:white;
  margin-top:-.5rem;margin-bottom:1rem;
  animation:fadeUp .8s var(--ease-out) .25s both;
}
.title em{color:var(--burg);font-style:normal}
.sub{
  font-size:1rem;font-weight:300;color:rgba(255,255,255,.4);
  line-height:1.8;max-width:420px;margin-bottom:2.5rem;
  animation:fadeUp .8s var(--ease-out) .4s both;
}
.links{
  display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;
  animation:fadeUp .8s var(--ease-out) .55s both;
}
.btn-p{font-family:var(--f-m);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;padding:.7rem 1.5rem;background:var(--burg);color:white;border:1px solid var(--burg);transition:background .2s}
.btn-p:hover{background:#8B1525}
.btn-o{font-family:var(--f-m);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;padding:.7rem 1.5rem;color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.16);transition:all .2s}
.btn-o:hover{color:white;border-color:rgba(255,255,255,.42)}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
</style>
</head>
<body>
<div id="cur"></div><div id="crr"></div>
<canvas id="plasma"></canvas>

<nav>
  <a href="/index.html" class="nav-brand">
    <img src="https://mwrcollective.com/wp-content/uploads/2025/09/MWR-Unity-Letters-White-2048x624.png" alt="MWR Collective" style="height:28px;width:auto;display:block">
    <span class="nav-tag">Politely Radical</span>
  </a>
  <a href="/index.html" class="nav-cta">Back to Home</a>
</nav>

<div id="content">
  <div class="num">404</div>
  <h1 class="title">Nothing here.<br><em>Yet.</em></h1>
  <p class="sub">This page doesn't exist — or it moved. Either way, you're not lost. Here's where you actually want to go.</p>
  <div class="links">
    <a href="/index.html" class="btn-p">Homepage →</a>
    <a href="/services.html" class="btn-o">Services</a>
    <a href="/work.html" class="btn-o">Our Work</a>
    <a href="/contact.html" class="btn-o">Contact</a>
  </div>
</div>

<script>
const cur=document.getElementById('cur'),crr=document.getElementById('crr');
let mx=innerWidth/2,my=innerHeight/2,cx=mx,cy=my,rx=mx,ry=my;
window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});
(function t(){cx+=(mx-cx)*.2;cy+=(my-cy)*.2;rx+=(mx-rx)*.07;ry+=(my-ry)*.07;cur.style.left=cx+'px';cur.style.top=cy+'px';crr.style.left=rx+'px';crr.style.top=ry+'px';requestAnimationFrame(t)})();
document.querySelectorAll('a').forEach(el=>{el.addEventListener('mouseenter',()=>document.body.classList.add('hov'));el.addEventListener('mouseleave',()=>document.body.classList.remove('hov'))});
(function(){
  function h(c){return[parseInt(c.slice(1,3),16),parseInt(c.slice(3,5),16),parseInt(c.slice(5,7),16)]}
  const orbs=[
    {c:'#C8203A',xf:.18,yf:.22,xp:0,yp:1.0,xa:.42,ya:.36,xc:.5,yc:.5,r:580,a:.6},
    {c:'#8B1525',xf:.12,yf:.16,xp:2.1,yp:0.5,xa:.32,ya:.40,xc:.3,yc:.6,r:500,a:.48},
    {c:'#2058A8',xf:.22,yf:.14,xp:1.4,yp:2.5,xa:.30,ya:.28,xc:.7,yc:.3,r:480,a:.38},
    {c:'#6B3FA0',xf:.10,yf:.20,xp:3.0,yp:0.8,xa:.36,ya:.32,xc:.6,yc:.7,r:440,a:.32},
  ];
  const canvas=document.getElementById('plasma'),ctx=canvas.getContext('2d');
  let W,H,t=0;
  const RGB=orbs.map(o=>h(o.c));
  function resize(){W=canvas.width=innerWidth;H=canvas.height=innerHeight}
  resize();window.addEventListener('resize',resize);
  function draw(){
    ctx.fillStyle='#0A0908';ctx.fillRect(0,0,W,H);
    ctx.globalCompositeOperation='screen';
    orbs.forEach((orb,i)=>{
      const x=(orb.xc+Math.sin(t*orb.xf+orb.xp)*orb.xa)*W;
      const y=(orb.yc+Math.cos(t*orb.yf+orb.yp)*orb.ya)*H;
      const r=orb.r*(0.82+Math.sin(t*orb.xf*1.7+i*.8)*.18);
      const a=orb.a*(0.78+Math.sin(t*orb.yf*1.3+i*1.2)*.22);
      const g=ctx.createRadialGradient(x,y,0,x,y,r);
      const[R,G,B]=RGB[i];
      g.addColorStop(0,`rgba(${R},${G},${B},${a})`);g.addColorStop(.4,`rgba(${R},${G},${B},${a*.4})`);g.addColorStop(1,`rgba(${R},${G},${B},0)`);
      ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    });
    ctx.globalCompositeOperation='source-over';
    t+=.005;requestAnimationFrame(draw);
  }
  draw();
})();
</script>

<style>
@media(max-width:768px){
  html{font-size:15px}body{cursor:auto}
  #cur,#crr{display:none}
  nav{padding:0 1.25rem}
  .nav-cta{font-size:.55rem;padding:.32rem .7rem}
  .num{font-size:clamp(6rem,20vw,10rem)}
  .links{flex-direction:column;align-items:center}
  .btn-p,.btn-o{width:100%;text-align:center;justify-content:center}
}
</style>

</body>
</html>
