<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>404 — MWR Collective</title><link href="https://fonts.googleapis.com/css2?family=Syne:wght@800&family=Manrope:wght@300;400&family=DM+Mono:wght@400&display=swap" rel="stylesheet"><style>*{margin:0;padding:0;box-sizing:border-box}body{background:#13100F;color:#F7F5F0;font-family:'Manrope',sans-serif;cursor:none;height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:2rem}:root{--burg:#C8203A;--f-d:'Syne',sans-serif;--f-m:'DM Mono',monospace}#cur{position:fixed;width:9px;height:9px;border-radius:50%;pointer-events:none;z-index:9999;transform:translate(-50%,-50%);background:white;mix-blend-mode:difference}.num{font-family:var(--f-d);font-size:clamp(6rem,22vw,16rem);font-weight:800;line-height:.85;letter-spacing:-.06em;color:rgba(255,255,255,.06);animation:up .8s ease forwards}.title{font-family:var(--f-d);font-size:clamp(1.6rem,4vw,3rem);font-weight:800;letter-spacing:-.04em;color:white;margin-top:-.5rem;animation:up .8s ease .2s both}.title em{color:var(--burg);font-style:normal}.sub{font-size:.95rem;font-weight:300;color:rgba(255,255,255,.42);line-height:1.8;max-width:400px;margin:1rem auto 2.5rem;animation:up .8s ease .4s both}.links{display:flex;gap:.75rem;flex-wrap:wrap;justify-content:center;animation:up .8s ease .55s both}a{font-family:var(--f-m);font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;text-decoration:none;padding:.7rem 1.5rem;transition:all .2s}.p{background:var(--burg);color:white;border:1px solid var(--burg)}.p:hover{background:#8B1525}.o{color:rgba(255,255,255,.55);border:1px solid rgba(255,255,255,.18)}.o:hover{color:white;border-color:rgba(255,255,255,.45)}@keyframes up{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}@media(max-width:768px){body{cursor:auto}#cur{display:none}}</style></head><body><div id="cur"></div><div class="num">404</div><h1 class="title">Nothing here.<br><em>Yet.</em></h1><p class="sub">This page doesn't exist — or it moved. Either way, you're not lost.</p><div class="links"><a href="index.html" class="p">Homepage →</a><a href="services.html" class="o">Services</a><a href="work.html" class="o">Our Work</a><a href="contact.html" class="o">Contact</a></div><script>const c=document.getElementById('cur');let mx=innerWidth/2,my=innerHeight/2,cx=mx,cy=my;window.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});(function t(){cx+=(mx-cx)*.2;cy+=(my-cy)*.2;c.style.left=cx+'px';c.style.top=cy+'px';requestAnimationFrame(t)})();</script></body></html>
